<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Habits - HabitMetric</title>
<link rel="stylesheet" href="CSS/myhabits.css">
<link rel="preconnect" href="https://fonts.googleapis.com"> 
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet"> 
</head>

<body>

<div class="main">

<h1>My Habits</h1>

<div class="habit-categories">

<h2>Choose Habit Category</h2>

<div class="category-grid">

<button class="category">🏃 Fitness</button>
<button class="category">📚 Study</button>
<button class="category">🧠 Mindfulness</button>
<button class="category">💧 Health</button>
<button class="category">💻 Productivity</button>

<button class="category add">+ Add Category</button>

</div>

</div>

<div class="habit-list">

<h2>Habits</h2>

<div class="habit-item">
<label>
<input type="checkbox">
Morning Run
</label>
</div>

<div class="habit-item">
<label>
<input type="checkbox">
Drink 2L Water
</label>
</div>

<div class="habit-item">
<label>
<input type="checkbox">
Read 20 Pages
</label>
</div>

<div class="habit-item add-habit">
+ Add New Habit
</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <meta name="description" content="HabitMetric — Manage and track your daily habits. Add, complete, and organize habits by category.">
    <title>My Habits — HabitMetric</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles: base first, then page-specific -->
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/myhabits.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🧠 HabitMetric</h2>
        <ul>
            <li><a href="index.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
            <li class="active"><a href="myhabits.html"><i data-lucide="check-circle"></i> My Habits</a></li>
            <li><a href="analytics.html"><i data-lucide="bar-chart-2"></i> Analytics</a></li>
            <li><a href="risk-insights.html"><i data-lucide="alert-triangle"></i> Risk Insights</a></li>
            <li><a href="settings.html"><i data-lucide="settings"></i> Settings</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="habits-container">
            <div class="page-header">
                <h1>My Habits</h1>
                <p class="page-subtitle">Build consistency one day at a time</p>
            </div>

            <!-- Category Selector -->
            <div class="habit-categories">
                <h2>Choose Habit Category</h2>
                <div class="category-grid">
                    <!-- This button MUST stay last — JS inserts new categories before it -->
                    <button class="category add">+ Add Category</button>
                </div>
            </div>

            <!-- Habit List — populated by myhabits.js -->
            <div class="habit-list"></div>

            <!-- Add Habit — changed from <div> to <button> for accessibility -->
            <button id="add-habit-btn">+ Add New Habit</button>
        </div>

    </div>

    <!-- Custom Emoji Picker Modal -->
    <div id="emoji-modal" class="modal-backdrop">
        <div class="modal-content emoji-picker-content">
            <h3>Choose an Icon</h3>
            <div class="emoji-grid-selection">
                <button class="emoji-option">🏃</button>
                <button class="emoji-option">📚</button>
                <button class="emoji-option">💧</button>
                <button class="emoji-option">🧠</button>
                <button class="emoji-option">💻</button>
                <button class="emoji-option">🧘</button>
                <button class="emoji-option">🍳</button>
                <button class="emoji-option">🛌</button>
                <button class="emoji-option">💸</button>
                <button class="emoji-option">📝</button>
                <button class="emoji-option">🎨</button>
                <button class="emoji-option">🏋️</button>
                <button class="emoji-option">💊</button>
                <button class="emoji-option">🧹</button>
                <button class="emoji-option">🌱</button>
                <button class="emoji-option remove-emoji">❌ None</button>
            </div>
            <button id="close-emoji-modal" class="modal-close-btn">Cancel</button>
        </div>
    </div>

    <!-- Scripts: shared logic first, then page-specific -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="JS/app.js"></script>
    <script src="JS/myhabits.js"></script>
</body>
</html>

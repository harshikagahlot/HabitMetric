<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HabitMetric — Manage and track your daily habits. Add, complete, and organize habits by category.">
    <title>My Habits — HabitMetric</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles: base first, then page-specific -->
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/myhabits.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🧠 HabitMetric</h2>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="myhabits.html">My Habits</a></li>
            <li><a href="analytics.html">Analytics</a></li>
            <li><a href="risk-insights.html">Risk Insights</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <h1>My Habits</h1>

        <!-- Category Selector -->
        <div class="habit-categories">
            <h2>Choose Habit Category</h2>
            <div class="category-grid">
                <button class="category">🏃 Fitness</button>
                <button class="category">📚 Study</button>
                <button class="category">🧠 Mindfulness</button>
                <button class="category">💧 Health</button>
                <button class="category">💻 Productivity</button>
                <!-- This button MUST stay last — JS inserts new categories before it -->
                <button class="category add">+ Add Category</button>
            </div>
        </div>

        <!-- Habit List — populated by myhabits.js -->
        <div class="habit-list"></div>

        <!-- Add Habit — changed from <div> to <button> for accessibility -->
        <button id="add-habit-btn">+ Add New Habit</button>

    </div>

    <!-- Scripts: shared logic first, then page-specific -->
    <script src="JS/app.js"></script>
    <script src="JS/myhabits.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <meta name="description" content="HabitMetric Smart Planner — Turn your plans into realistic action.">
    <title>Smart Planner — HabitMetric</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/planner.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🧠 HabitMetric</h2>
        <ul>
            <li><a href="index.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
            <li><a href="myhabits.html"><i data-lucide="check-circle"></i> My Habits</a></li>
            <li><a href="analytics.html"><i data-lucide="bar-chart-2"></i> Analytics</a></li>
            <li class="active"><a href="planner.html"><i data-lucide="calendar-days"></i> Smart Planner</a></li>
            <li><a href="settings.html"><i data-lucide="settings"></i> Settings</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="planner-container">
            <div class="page-header">
                <h1>Smart Planner</h1>
                <p class="page-subtitle">Turn your rough plans into a realistic execution strategy.</p>
            </div>

            <!-- Planning Mode Selector -->
            <div class="planner-modes" id="planner-mode-tabs">
                <button class="mode-tab active" data-mode="week">Weekly Planner</button>
                <button class="mode-tab" data-mode="month">Monthly Overview</button>
            </div>

            <!-- Planner Input Form -->
            <div class="planner-card">
                <div class="form-section">
                    <label for="raw-plan">Paste Your Rough Plan / Schedule</label>
                    <p>Enter your to-do lists, schedule fragments, or goals (one per line).</p>
                    <textarea id="raw-plan" class="planner-input" placeholder="Example:
- 3 gym sessions
- Read 10 pages daily
- Review weekly budget
- Code for 2 hours"></textarea>
                </div>

                <div class="generate-actions">
                    <button id="generate-plan-btn" class="btn-generate">Generate Habit Plan</button>
                </div>
            </div>

            <!-- Generated Plan Output -->
            <div id="plan-output" class="plan-output-card hidden">
                <div class="output-header">
                    <h3 id="output-title">Your Generated Habits</h3>
                </div>
                
                <div class="generated-list" id="generated-items-list">
                    <!-- Items inserted by JS -->
                </div>

                <div class="save-actions">
                    <button id="btn-add-all" class="btn-add-all"><i data-lucide="plus-circle"></i> Add All to My Habits</button>
                </div>
            </div>

        </div>
    </div>

    <!-- SPA Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="JS/app.js"></script>
    <script src="JS/planner.js"></script>
    <script src="JS/router.js"></script>
</body>
</html>
